AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Static website hosting for a Three.js example. A private S3 bucket holds the
  site files and CloudFront serves them globally with HTTPS, using an Origin
  Access Control so the bucket itself never has to be public. Optionally
  attaches a custom domain via ACM + Route 53.

Parameters:
  ProjectName:
    Type: String
    Default: solterra-threejs
    Description: Used as a prefix for resource names.
    AllowedPattern: "^[a-z0-9-]{3,40}$"
    ConstraintDescription: lowercase letters, digits, hyphens; 3-40 chars.

  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
    Description: CloudFront price class. 100 covers US/Europe and is cheapest.

  DomainName:
    Type: String
    Default: ""
    Description: >
      Apex/root domain to serve the site from (e.g. solterra.example.com or
      example.com). Leave blank to skip the custom domain wiring and use the
      default *.cloudfront.net hostname.

  IncludeWww:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      If true and DomainName is set, also serve from www.<DomainName>. Only
      meaningful when DomainName is an apex like example.com.

  HostedZoneId:
    Type: String
    Default: ""
    Description: >
      Route 53 hosted zone ID that owns DomainName. Required when DomainName
      is set. Used both for ACM DNS validation and for the alias record(s).

Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]
  HasWww: !And
    - !Condition HasDomain
    - !Equals [!Ref IncludeWww, "true"]

Resources:
  # ---------------------------------------------------------------------------
  # ACM certificate. Must live in us-east-1 for CloudFront to use it, so the
  # whole stack must be deployed in us-east-1 when DomainName is set.
  #
  # DomainValidationOptions with a HostedZoneId tells ACM to publish the
  # validation CNAMEs into Route 53 itself, so issuance is hands-off.
  # ---------------------------------------------------------------------------
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasDomain
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames: !If
        - HasWww
        - [!Sub "www.${DomainName}"]
        - !Ref AWS::NoValue
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
        - !If
          - HasWww
          - DomainName: !Sub "www.${DomainName}"
            HostedZoneId: !Ref HostedZoneId
          - !Ref AWS::NoValue

  # ---------------------------------------------------------------------------
  # S3 bucket. Private. Versioning on so accidental overwrites are recoverable.
  # ---------------------------------------------------------------------------
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  # ---------------------------------------------------------------------------
  # Origin Access Control. Modern replacement for the legacy Origin Access
  # Identity. CloudFront uses SigV4 to fetch from S3.
  # ---------------------------------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ---------------------------------------------------------------------------
  # CloudFront distribution. Aliases and ViewerCertificate are conditional on
  # whether a DomainName was supplied.
  # ---------------------------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${ProjectName} static site"
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        DefaultRootObject: index.html
        PriceClass: !Ref PriceClass
        Aliases: !If
          - HasDomain
          - !If
            - HasWww
            - [!Ref DomainName, !Sub "www.${DomainName}"]
            - [!Ref DomainName]
          - !Ref AWS::NoValue
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Managed-CachingOptimized is AWS' recommended cache policy for
          # static sites. ID is the same in every account/region.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # Friendly behavior for SPA-ish routing: 403/404 from S3 -> /index.html
        # so deep links still load. The site here doesn't use routing yet, but
        # this is the pattern students will reach for next.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate: !If
          - HasDomain
          - AcmCertificateArn: !Ref Certificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

  # ---------------------------------------------------------------------------
  # Bucket policy: only this distribution can read. Ties the OAC to the bucket.
  # ---------------------------------------------------------------------------
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ---------------------------------------------------------------------------
  # Route 53 alias records. CloudFront's hosted zone ID is the same global
  # constant Z2FDTNDATAQYW2, hardcoded here per AWS docs.
  # ---------------------------------------------------------------------------
  ApexAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  ApexAliasRecordIPv6:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasWww
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwAliasRecordIPv6:
    Type: AWS::Route53::RecordSet
    Condition: HasWww
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  BucketName:
    Description: Name of the S3 bucket holding the site files.
    Value: !Ref SiteBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  DistributionId:
    Description: CloudFront distribution ID. Use this for cache invalidations.
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-DistributionId"

  DistributionDomainName:
    Description: CloudFront-assigned hostname (always works, even with custom domain).
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-DistributionDomainName"

  SiteUrl:
    Description: Open this in a browser after deploy + sync complete.
    Value: !If
      - HasDomain
      - !Sub "https://${DomainName}"
      - !Sub "https://${CloudFrontDistribution.DomainName}"

  CertificateArn:
    Description: ACM certificate ARN (only when a custom domain is configured).
    Condition: HasDomain
    Value: !Ref Certificate
