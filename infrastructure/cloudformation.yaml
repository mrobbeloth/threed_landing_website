AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Static website hosting for a Three.js example. A private S3 bucket holds the
  site files and CloudFront serves them globally with HTTPS, using an Origin
  Access Control so the bucket itself never has to be public.

Parameters:
  ProjectName:
    Type: String
    Default: solterra-threejs
    Description: Used as a prefix for resource names.
    AllowedPattern: "^[a-z0-9-]{3,40}$"
    ConstraintDescription: lowercase letters, digits, hyphens; 3-40 chars.

  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
    Description: CloudFront price class. 100 covers US/Europe and is cheapest.

Resources:
  # ---------------------------------------------------------------------------
  # S3 bucket. Private. Versioning on so accidental overwrites are recoverable.
  # ---------------------------------------------------------------------------
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  # ---------------------------------------------------------------------------
  # Origin Access Control. Modern replacement for the legacy Origin Access
  # Identity. CloudFront uses SigV4 to fetch from S3.
  # ---------------------------------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ---------------------------------------------------------------------------
  # Cache policy: allow GET/HEAD with default behavior. We disable query-string
  # and cookie caching since this site is fully static.
  # ---------------------------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${ProjectName} static site"
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        DefaultRootObject: index.html
        PriceClass: !Ref PriceClass
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Managed-CachingOptimized is AWS' recommended cache policy for
          # static sites. ID is the same in every account/region.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # Friendly behavior for SPA-ish routing: 403/404 from S3 -> /index.html
        # so deep links still load. The site here doesn't use routing yet, but
        # this is the pattern students will reach for next.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # ---------------------------------------------------------------------------
  # Bucket policy: only this distribution can read. Ties the OAC to the bucket.
  # ---------------------------------------------------------------------------
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

Outputs:
  BucketName:
    Description: Name of the S3 bucket holding the site files.
    Value: !Ref SiteBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  DistributionId:
    Description: CloudFront distribution ID. Use this for cache invalidations.
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-DistributionId"

  DistributionDomainName:
    Description: Public hostname of the site.
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-DistributionDomainName"

  SiteUrl:
    Description: Open this in a browser after deploy + sync complete.
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
